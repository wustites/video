<!doctype html>
<html lang="ja" data-resolution="portrait">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1080, height=1920" />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { width: 1080px; height: 1920px; overflow: hidden; }
      body {
        background: radial-gradient(ellipse at center, #1a1a2e 0%, #0a0a1a 100%);
        font-family: "Noto Sans CJK SC", "Microsoft YaHei", "SimHei", sans-serif;
      }
      #root { width: 1080px; height: 1920px; position: relative; overflow: hidden; }
      .stars {
        position: absolute; top: 0; left: 0; width: 100%; height: 100%;
        background: radial-gradient(2px 2px at 20% 30%, #fff 50%, transparent 100%),
                    radial-gradient(1px 1px at 40% 70%, #fff 50%, transparent 100%),
                    radial-gradient(2px 2px at 60% 20%, #fff 50%, transparent 100%),
                    radial-gradient(1px 1px at 80% 60%, #fff 50%, transparent 100%),
                    radial-gradient(2px 2px at 10% 80%, #fff 50%, transparent 100%),
                    radial-gradient(1px 1px at 90% 40%, #fff 50%, transparent 100%);
        opacity: 0.6;
      }
      .planet-container { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 800px; height: 800px; }
      .planet { position: absolute; border-radius: 50%; transform: translate(-50%, -50%); left: 50%; top: 50%; }
      .sun { width: 120px; height: 120px; background: radial-gradient(circle at 30% 30%, #fff7ae, #ffcc00, #ff6600); box-shadow: 0 0 60px #ff9900, 0 0 120px #ff660080; }
      .mercury { width: 20px; height: 20px; background: radial-gradient(circle at 30% 30%, #e8e8e8, #b5b5b5, #8a8a8a); }
      .venus { width: 30px; height: 30px; background: radial-gradient(circle at 30% 30%, #ffe4b5, #daa520, #cd853f); }
      .earth { width: 32px; height: 32px; background: radial-gradient(circle at 30% 30%, #87ceeb, #4169e1, #000080); }
      .mars { width: 24px; height: 24px; background: radial-gradient(circle at 30% 30%, #ff7f50, #cd5c5c, #8b0000); }
      .jupiter { width: 60px; height: 60px; background: radial-gradient(circle at 30% 30%, #deb887, #d2691e, #8b4513); }
      .saturn { width: 50px; height: 50px; background: radial-gradient(circle at 30% 30%, #f5deb3, #daa520, #b8860b); }
      .saturn-ring { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) rotateX(70deg); width: 90px; height: 90px; border: 4px solid rgba(210, 180, 140, 0.6); border-radius: 50%; }
      .uranus { width: 40px; height: 40px; background: radial-gradient(circle at 30% 30%, #afeeee, #5f9ea0, #2f4f4f); }
      .neptune { width: 38px; height: 38px; background: radial-gradient(circle at 30% 30%, #6495ed, #1e90ff, #000080); }
      .orbit { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); border: 1px solid rgba(255, 255, 255, 0.15); border-radius: 50%; }
      .text-overlay { position: absolute; bottom: 200px; left: 50%; transform: translateX(-50%); width: 900px; text-align: center; color: #fff; font-size: 32px; line-height: 1.5; text-shadow: 0 2px 10px rgba(0,0,0,0.8); opacity: 0; }
      .planet-name { position: absolute; top: 40px; left: 50%; transform: translateX(-50%); color: #ffcc00; font-size: 48px; font-weight: bold; text-shadow: 0 2px 15px rgba(255,204,0,0.5); opacity: 0; }
    </style>
  </head>
  <body>
    <div id="root" data-composition-id="solar-ja" data-start="0" data-duration="90" data-width="1080" data-height="1920">
      <div class="stars"></div>
      <div class="planet-name" id="planetName"></div>
      <div class="planet-container">
        <div class="orbit" style="width:200px;height:200px"></div>
        <div class="orbit" style="width:280px;height:280px"></div>
        <div class="orbit" style="width:360px;height:360px"></div>
        <div class="orbit" style="width:440px;height:440px"></div>
        <div class="orbit" style="width:540px;height:540px"></div>
        <div class="orbit" style="width:640px;height:640px"></div>
        <div class="orbit" style="width:720px;height:720px"></div>
        <div class="orbit" style="width:800px;height:800px"></div>
        <div class="planet sun" id="sun"></div>
        <div class="planet mercury" id="mercury"></div>
        <div class="planet venus" id="venus"></div>
        <div class="planet earth" id="earth"></div>
        <div class="planet mars" id="mars"></div>
        <div class="planet jupiter" id="jupiter"></div>
        <div class="planet saturn" id="saturn"><div class="saturn-ring"></div></div>
        <div class="planet uranus" id="uranus"></div>
        <div class="planet neptune" id="neptune"></div>
      </div>
      <div class="text-overlay" id="narrationText"></div>
      <audio id="voiceover" src="../public/voiceover/solar-system-ja.mp3" preload="auto"></audio>
    </div>

    <script>
      const narrations = [
        { time: 0, text: "太陽から、太陽系の旅を始めましょう。", planet: "sun", name: "太陽" },
        { time: 8, text: "太陽は私たちの恒星です。高温のプラズマでできた輝く球体で、その重力がすべての惑星を軌道につなぎとめています。", planet: "sun", name: "太陽" },
        { time: 18, text: "太陽に最も近いのは水星です。最も小さな惑星で、強烈な熱と長い寒い夜のあいだを素早く進みます。", planet: "mercury", name: "水星" },
        { time: 28, text: "次は金星です。私たちの空で明るく見え、厚い雲と強い温室効果の大気に包まれています。", planet: "venus", name: "金星" },
        { time: 38, text: "そして地球です。私たちの青い故郷には、液体の水、生命を支える環境、守ってくれる大気、そして一つの月があります。", planet: "earth", name: "地球" },
        { time: 48, text: "地球の外側には火星があります。赤い惑星には、砂嵐、古い川の跡、そして太陽系で最も高い火山があります。", planet: "mars", name: "火星" },
        { time: 58, text: "さらに外側には木星があります。最大の惑星で、縞模様の雲、巨大な嵐、そして多くの衛星を持っています。", planet: "jupiter", name: "木星" },
        { time: 68, text: "次に現れるのは土星です。広い氷の環と、やわらかな金色でよく知られています。", planet: "saturn", name: "土星" },
        { time: 76, text: "その次は天王星です。冷たい青緑色の氷巨大惑星で、大きく傾き、まるで横倒しで太陽を回っているように見えます。", planet: "uranus", name: "天王星" },
        { time: 84, text: "主要な惑星の外縁には海王星があります。深い青色で風が強く、遠い暗闇の中を回っています。", planet: "neptune", name: "海王星" }
      ];

      const orbitRadii = { mercury: 100, venus: 140, earth: 180, mars: 220, jupiter: 270, saturn: 320, uranus: 360, neptune: 400 };
      const planets = ["mercury", "venus", "earth", "mars", "jupiter", "saturn", "uranus", "neptune"];

      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });

      tl.to("#sun", { scale: 1, opacity: 1, duration: 0.5 }, 0);

      planets.forEach(p => {
        const el = document.getElementById(p);
        const radius = orbitRadii[p];
        const angle = Math.random() * Math.PI * 2;
        el.style.transform = `translate(calc(-50% + ${Math.cos(angle) * radius}px), calc(-50% + ${Math.sin(angle) * radius}px))`;
      });

      narrations.forEach((n, i) => {
        const endTime = narrations[i + 1]?.time || 90;
        tl.to("#narrationText", { opacity: 1, duration: 0.5, onStart: () => { document.getElementById("narrationText").textContent = n.text; } }, n.time);
        tl.to("#narrationText", { opacity: 0, duration: 0.5 }, endTime - 0.5);
        if (n.planet !== "sun") {
          tl.to("#" + n.planet, { scale: 1.5, opacity: 1, duration: 0.5 }, n.time);
          tl.to("#" + n.planet, { scale: 1, duration: 0.5 }, n.time + 0.5);
        }
        tl.to("#planetName", { opacity: 1, duration: 0.5, onStart: () => { document.getElementById("planetName").textContent = n.name; } }, n.time);
        tl.to("#planetName", { opacity: 0, duration: 0.5 }, endTime - 0.5);
      });

      planets.forEach(p => {
        const el = document.getElementById(p);
        const radius = orbitRadii[p];
        tl.to(el, { rotation: 360, duration: 20 + Math.random() * 30, ease: "none", transformOrigin: `${-radius}px 0px`, repeat: -1 }, 0);
      });

      window.__timelines["solar-ja"] = tl;
    </script>
  </body>
</html>
