<!doctype html>
<html lang="ja" data-resolution="portrait">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1080, height=1920" />
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script src="../public/solar-scene.js"></script>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { width: 1080px; height: 1920px; overflow: hidden; }
      body {
        background: #02040b;
        font-family: "Noto Sans JP", "Microsoft YaHei", "SimHei", sans-serif;
      }
      #root {
        width: 1080px; height: 1920px;
        position: relative; overflow: hidden;
      }
      #solar-canvas {
        position: absolute; top: 0; left: 0;
        width: 100%; height: 100%;
      }
      .text-overlay {
        position: absolute; bottom: 200px; left: 50%;
        transform: translateX(-50%);
        width: 900px; text-align: center;
        color: #fff; font-size: 32px; line-height: 1.5;
        text-shadow: 0 2px 10px rgba(0,0,0,0.8);
        opacity: 0;
        z-index: 10;
      }
      .planet-name {
        position: absolute; top: 40px; left: 50%;
        transform: translateX(-50%);
        color: #ffcc00; font-size: 48px; font-weight: bold;
        text-shadow: 0 2px 15px rgba(255,204,0,0.5);
        opacity: 0;
        z-index: 10;
      }
    </style>
  </head>
  <body>
    <div id="root" data-composition-id="solar-ja" data-start="0" data-duration="90" data-width="1080" data-height="1920">
      <canvas id="solar-canvas"></canvas>
      <div class="planet-name" id="planetName"></div>
      <div class="text-overlay" id="narrationText"></div>
      <audio id="voiceover" src="../public/voiceover/solar-system-ja.mp3" preload="auto" data-start="0" data-duration="90"></audio>
    </div>

    <script>
      const narrations = [
        { time: 0, text: "太陽から、太陽系の旅を始めましょう。", planet: "sun", name: "太陽" },
        { time: 8, text: "太陽は私たちの恒星です。高温のプラズマでできた輝く球体で、その重力がすべての惑星を軌道につなぎとめています。", planet: "sun", name: "太陽" },
        { time: 18, text: "太陽に最も近いのは水星です。最も小さな惑星で、強烈な熱と長い寒い夜のあいだを素早く進みます。", planet: "mercury", name: "水星" },
        { time: 28, text: "次は金星です。私たちの空で明るく見え、厚い雲と強い温室効果の大気に包まれています。", planet: "venus", name: "金星" },
        { time: 38, text: "そして地球です。私たちの青い故郷には、液体の水、生命を支える環境、守ってくれる大気、そして一つの月があります。", planet: "earth", name: "地球" },
        { time: 48, text: "地球の外側には火星があります。赤い惑星には、砂嵐、古い川の跡、そして太陽系で最も高い火山があります。", planet: "mars", name: "火星" },
        { time: 58, text: "さらに外側には木星があります。最大の惑星で、縞模様の雲、巨大な嵐、そして多くの衛星を持っています。", planet: "jupiter", name: "木星" },
        { time: 68, text: "次に現れるのは土星です。広い氷の環と、やわらかな金色でよく知られています。", planet: "saturn", name: "土星" },
        { time: 76, text: "その次は天王星です。冷たい青冷たい青緑色の氷巨大惑星で、大きく傾き、まるで横倒しで太陽を回っているように見えます。", planet: "uranus", name: "天王星" },
        { time: 84, text: "主要な惑星の外縁には海王星があります。深い青色で風が強く、遠い暗闇の中を回っています。", planet: "neptune", name: "海王星" }
      ];

      const canvas = document.getElementById('solar-canvas');
      const scene = SolarScene.init(canvas, 1080, 1920);

      const segments = narrations.map((n, i) => ({
        name: n.planet === 'sun' ? 'Sun' : n.planet.charAt(0).toUpperCase() + n.planet.slice(1),
        start: n.time * 30,
        end: (narrations[i + 1]?.time || 90) * 30
      }));

      const totalFrames = 90 * 30;

      window.__timelines = window.__timelines || {};
      window.__timelines["solar-ja"] = gsap.timeline({ paused: true, onUpdate: function() {
        const frame = Math.floor(this.time() * 30);
        scene.update(frame, totalFrames, segments);
      }});

      const tl = window.__timelines["solar-ja"];
      narrations.forEach((n, i) => {
        const startTime = n.time;
        const endTime = narrations[i + 1]?.time || 90;

        tl.to("#narrationText", {
          opacity: 1, duration: 0.5,
          onStart: () => { document.getElementById("narrationText").textContent = n.text; }
        }, startTime);

        tl.to("#narrationText", { opacity: 0, duration: 0.5 }, endTime - 0.5);

        tl.to("#planetName", {
          opacity: 1, duration: 0.5,
          onStart: () => { document.getElementById("planetName").textContent = n.name; }
        }, startTime);
        tl.to("#planetName", { opacity: 0, duration: 0.5 }, endTime - 0.5);
      });
    </script>
  </body>
</html>
