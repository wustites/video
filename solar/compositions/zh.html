<!doctype html>
<html lang="zh" data-resolution="portrait">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1080, height=1920" />
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script src="../public/solar-scene.js"></script>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { width: 1080px; height: 1920px; overflow: hidden; }
      body {
        background: #02040b;
        font-family: "Noto Sans SC", "Microsoft YaHei", "SimHei", sans-serif;
      }
      #root {
        width: 1080px; height: 1920px;
        position: relative; overflow: hidden;
      }
      #solar-canvas {
        position: absolute; top: 0; left: 0;
        width: 100%; height: 100%;
      }
      .text-overlay {
        position: absolute; bottom: 200px; left: 50%;
        transform: translateX(-50%);
        width: 900px; text-align: center;
        color: #fff; font-size: 32px; line-height: 1.5;
        text-shadow: 0 2px 10px rgba(0,0,0,0.8);
        opacity: 0;
        z-index: 10;
      }
      .planet-name {
        position: absolute; top: 40px; left: 50%;
        transform: translateX(-50%);
        color: #ffcc00; font-size: 48px; font-weight: bold;
        text-shadow: 0 2px 15px rgba(255,204,0,0.5);
        opacity: 0;
        z-index: 10;
      }
    </style>
  </head>
  <body>
    <div id="root" data-composition-id="solar-zh" data-start="0" data-duration="90" data-width="1080" data-height="1920">
      <canvas id="solar-canvas"></canvas>
      <div class="planet-name" id="planetName"></div>
      <div class="text-overlay" id="narrationText"></div>
      <audio id="voiceover" src="../public/voiceover/solar-system-zh.mp3" preload="auto" data-start="0" data-duration="90"></audio>
    </div>

    <script>
      const narrations = [
        { time: 0, text: "从太阳开始，我们开启一段太阳系之旅。", planet: "sun", name: "太阳" },
        { time: 8, text: "太阳是我们的恒星。它是一颗炽热等离子体组成的发光球体，用强大的引力让每一颗行星保持在轨道上。", planet: "sun", name: "太阳" },
        { time: 18, text: "最靠近太阳的是水星。它是最小的行星，在强烈高温和漫长寒夜之间快速运行。", planet: "mercury", name: "水星" },
        { time: 28, text: "接着是金星。它在我们的天空中非常明亮，被厚厚的云层和强烈的温室大气包裹。", planet: "venus", name: "金星" },
        { time: 38, text: "然后是地球。我们的蓝色家园拥有液态水、生命系统、一层保护性大气，以及一颗稳定相伴的月球。", planet: "earth", name: "地球" },
        { time: 48, text: "地球之外是火星。红色的火星有尘暴、古老河谷，以及太阳系中最高的火山。", planet: "mars", name: "火星" },
        { time: 58, text: "再往外是木星。它是最大的行星，拥有条纹云带、巨大风暴和许多卫星。", planet: "jupiter", name: "木星" },
        { time: 68, text: "随后出现的是土星。它以宽阔的冰质光环和柔和的金色而闻名。", planet: "saturn", name: "土星" },
        { time: 76, text: "接下来是天王星。这颗寒冷的蓝绿色冰巨星倾斜得非常厉害，仿佛侧身绕着太阳滚动。", planet: "uranus", name: "天王星" },
        { time: 84, text: "在主要行星的边缘，是海王星。它深蓝而多风，在遥远的黑暗中环绕太阳运行。", planet: "neptune", name: "海王星" }
      ];

      const canvas = document.getElementById('solar-canvas');
      const scene = SolarScene.init(canvas, 1080, 1920);

      const segments = narrations.map((n, i) => ({
        name: n.planet === 'sun' ? 'Sun' : n.planet.charAt(0).toUpperCase() + n.planet.slice(1),
        start: n.time * 30,
        end: (narrations[i + 1]?.time || 90) * 30
      }));

      const totalFrames = 90 * 30;

      window.__timelines = window.__timelines || {};
      window.__timelines["solar-zh"] = gsap.timeline({ paused: true, onUpdate: function() {
        const frame = Math.floor(this.time() * 30);
        scene.update(frame, totalFrames, segments);
      }});

      const tl = window.__timelines["solar-zh"];
      narrations.forEach((n, i) => {
        const startTime = n.time;
        const endTime = narrations[i + 1]?.time || 90;

        tl.to("#narrationText", {
          opacity: 1, duration: 0.5,
          onStart: () => { document.getElementById("narrationText").textContent = n.text; }
        }, startTime);

        tl.to("#narrationText", { opacity: 0, duration: 0.5 }, endTime - 0.5);

        tl.to("#planetName", {
          opacity: 1, duration: 0.5,
          onStart: () => { document.getElementById("planetName").textContent = n.name; }
        }, startTime);
        tl.to("#planetName", { opacity: 0, duration: 0.5 }, endTime - 0.5);
      });
    </script>
  </body>
</html>
