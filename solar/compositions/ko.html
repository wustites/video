<!doctype html>
<html lang="ko" data-resolution="portrait">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1080, height=1920" />
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script src="../public/solar-scene.js"></script>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { width: 1080px; height: 1920px; overflow: hidden; }
      body {
        background: #02040b;
        font-family: "Noto Sans KR", "Microsoft YaHei", "SimHei", sans-serif;
      }
      #root {
        width: 1080px; height: 1920px;
        position: relative; overflow: hidden;
      }
      #solar-canvas {
        position: absolute; top: 0; left: 0;
        width: 100%; height: 100%;
      }
      .text-overlay {
        position: absolute; bottom: 200px; left: 50%;
        transform: translateX(-50%);
        width: 900px; text-align: center;
        color: #fff; font-size: 32px; line-height: 1.5;
        text-shadow: 0 2px 10px rgba(0,0,0,0.8);
        opacity: 0;
        z-index: 10;
      }
      .planet-name {
        position: absolute; top: 40px; left: 50%;
        transform: translateX(-50%);
        color: #ffcc00; font-size: 48px; font-weight: bold;
        text-shadow: 0 2px 15px rgba(255,204,0,0.5);
        opacity: 0;
        z-index: 10;
      }
    </style>
  </head>
  <body>
    <div id="root" data-composition-id="solar-ko" data-start="0" data-duration="90" data-width="1080" data-height="1920">
      <canvas id="solar-canvas"></canvas>
      <div class="planet-name" id="planetName"></div>
      <div class="text-overlay" id="narrationText"></div>
      <audio id="voiceover" src="../public/voiceover/solar-system-ko.mp3" preload="auto" data-start="0" data-duration="90"></audio>
    </div>

    <script>
      const narrations = [
        { time: 0, text: "태양에서부터 태양계 여행을 시작합니다.", planet: "sun", name: "태양" },
        { time: 8, text: "태양은 우리의 별입니다. 뜨거운 플라스마로 이루어진 빛나는 구체이며, 강한 중력으로 모든 행성을 궤도에 붙잡아 둡니다.", planet: "sun", name: "태양" },
        { time: 18, text: "태양에 가장 가까운 곳에는 수성이 있습니다. 수성은 가장 작은 행성으로, 강렬한 열과 긴 추운 밤 사이를 빠르게 움직입니다.", planet: "mercury", name: "수성" },
        { time: 28, text: "다음은 금성입니다. 금성은 우리 하늘에서 밝게 보이며, 두꺼운 구름과 강한 온실 대기에 둘러싸여 있습니다.", planet: "venus", name: "금성" },
        { time: 38, text: "그다음은 지구입니다. 우리의 푸른 집에는 액체 물, 생명 시스템, 보호하는 대기, 그리고 안정적으로 함께하는 하나의 달이 있습니다.", planet: "earth", name: "지구" },
        { time: 48, text: "지구 너머에는 화성이 있습니다. 붉은 행성 화성에는 먼지 폭풍, 오래된 강의 흔적, 그리고 태양계에서 가장 높은 화산이 있습니다.", planet: "mars", name: "화성" },
        { time: 58, text: "더 멀리에는 목성이 있습니다. 목성은 가장 큰 행성으로, 줄무늬 구름, 거대한 폭풍, 그리고 많은 위성을 가지고 있습니다.", planet: "jupiter", name: "목성" },
        { time: 68, text: "그다음에는 토성이 나타납니다. 토성은 넓은 얼음 고리와 부드러운 황금빛으로 유명합니다.", planet: "saturn", name: "토성" },
        { time: 76, text: "다음은 천왕성입니다. 차가운 청록색 얼음 거대 행성으로, 크게 기울어져 마치 옆으로 누운 채 태양을 도는 것처럼 보입니다.", planet: "uranus", name: "천왕성" },
        { time: 84, text: "주요 행성의 가장 먼 가장자리에는 해왕성이 있습니다. 짙푸르고 바람이 거센 행성으로, 먼 어둠 속에서 태양을 돌고 있습니다.", planet: "neptune", name: "해왕성" }
      ];

      const canvas = document.getElementById('solar-canvas');
      const scene = SolarScene.init(canvas, 1080, 1920);

      const segments = narrations.map((n, i) => ({
        name: n.planet === 'sun' ? 'Sun' : n.planet.charAt(0).toUpperCase() + n.planet.slice(1),
        start: n.time * 30,
        end: (narrations[i + 1]?.time || 90) * 30
      }));

      const totalFrames = 90 * 30;

      window.__timelines = window.__timelines || {};
      window.__timelines["solar-ko"] = gsap.timeline({ paused: true, onUpdate: function() {
        const frame = Math.floor(this.time() * 30);
        scene.update(frame, totalFrames, segments);
      }});

      const tl = window.__timelines["solar-ko"];
      narrations.forEach((n, i) => {
        const startTime = n.time;
        const endTime = narrations[i + 1]?.time || 90;

        tl.to("#narrationText", {
          opacity: 1, duration: 0.5,
          onStart: () => { document.getElementById("narrationText").textContent = n.text; }
        }, startTime);

        tl.to("#narrationText", { opacity: 0, duration: 0.5 }, endTime - 0.5);

        tl.to("#planetName", {
          opacity: 1, duration: 0.5,
          onStart: () => { document.getElementById("planetName").textContent = n.name; }
        }, startTime);
        tl.to("#planetName", { opacity: 0, duration: 0.5 }, endTime - 0.5);
      });
    </script>
  </body>
</html>
