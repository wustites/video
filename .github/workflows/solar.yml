name: solar - Build and release video

on:
  push:
    tags:
      - "v*-solar"

permissions:
  contents: write

concurrency:
  group: solar-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build solar video
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install system packages
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg fonts-noto-cjk fonts-noto-color-emoji
          fc-cache -f -v

      - name: Generate voiceover
        run: |
          pip install edge-tts
          edge-tts --voice en-US-AriaNeural --text "$(cat public/voiceover/narration.en.txt)" --write-media public/voiceover/solar-system-en.mp3
          edge-tts --voice zh-CN-XiaoxiaoNeural --text "$(cat public/voiceover/narration.zh.txt)" --write-media public/voiceover/solar-system-zh.mp3
          edge-tts --voice ja-JP-NanamiNeural --text "$(cat public/voiceover/narration.ja.txt)" --write-media public/voiceover/solar-system-ja.mp3
          edge-tts --voice ko-KR-SunHiNeural --text "$(cat public/voiceover/narration.ko.txt)" --write-media public/voiceover/solar-system-ko.mp3
        working-directory: solar

      - name: Render videos
        run: |
          npx --yes hyperframes@0.6.112 render -c compositions/en.html -o out/solar-system-en-vertical.mp4
          npx --yes hyperframes@0.6.112 render -c compositions/zh.html -o out/solar-system-zh-vertical.mp4
          npx --yes hyperframes@0.6.112 render -c compositions/ja.html -o out/solar-system-ja-vertical.mp4
          npx --yes hyperframes@0.6.112 render -c compositions/ko.html -o out/solar-system-ko-vertical.mp4
        working-directory: solar

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: solar-system-${{ github.ref_name }}
          path: solar/out/*.mp4
          if-no-files-found: error

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: solar/out/*.mp4
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
