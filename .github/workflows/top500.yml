name: top500 - Build and release video

on:
  push:
    tags:
      - "v*-top500"

permissions:
  contents: write

concurrency:
  group: top500-${{ github.ref }}
  cancel-in-progress: true

jobs:
  render:
    name: Render top500 video
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm ci
        working-directory: top500

      - name: Install Chinese fonts
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-noto-cjk fonts-noto-color-emoji
          fc-cache -fv

      - name: Typecheck
        run: npm run typecheck
        working-directory: top500

      - name: Cache network audio
        run: mkdir -p public/audio && curl -L -o public/audio/network-audio.mp3 "https://incompetech.com/music/royalty-free/mp3-royaltyfree/Canon%20in%20D%20Major.mp3"
        working-directory: top500

      - name: Render poster
        run: npx remotion still src/index.ts Top500Video out/poster-vertical.png --frame=90 --log=verbose
        working-directory: top500

      - name: Render video
        run: npx remotion render src/index.ts Top500Video out/top500-vertical.mp4 --props=./render-props.json --log=verbose
        working-directory: top500

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: top500-vertical-video
          path: |
            top500/out/top500-vertical.mp4
            top500/out/poster-vertical.png
          if-no-files-found: error
          retention-days: 14

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            top500/out/top500-vertical.mp4
            top500/out/poster-vertical.png
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
