name: top500 - Build and release video

on:
  push:
    tags:
      - "v*-top500"

permissions:
  contents: write

concurrency:
  group: top500-${{ github.ref }}
  cancel-in-progress: true

jobs:
  render:
    name: Render top500 video
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install system packages
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Render video
        run: npx --yes hyperframes@0.6.112 render -o out/top500-vertical.mp4
        working-directory: top500

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: top500-vertical-video
          path: top500/out/top500-vertical.mp4
          if-no-files-found: error
          retention-days: 14

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: top500/out/top500-vertical.mp4
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
