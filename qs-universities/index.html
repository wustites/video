        align-items: center;
        padding: 50px 60px 40px;
        position: relative;
      }
      .header {
        text-align: center;
        margin-bottom: 35px;
        width: 100%;
      }
      .title { 
        color: #fff; 
        font-size: 56px; 
        font-weight: 800; 
        letter-spacing: 4px;
        text-shadow: 0 4px 20px rgba(233, 69, 96, 0.3);
      }
      .title-accent {
        color: #e94560;
      }
      .subtitle {
        color: rgba(255,255,255,0.6);
        font-size: 24px;
        margin-top: 12px;
        letter-spacing: 8px;
        text-transform: uppercase;
      }
      .divider {
        width: 120px;
        height: 3px;
        background: linear-gradient(90deg, transparent, #e94560, transparent);
        margin: 20px auto 0;
      }
      .page-container {
        width: 100%;
        flex: 1;
        position: relative;
      }
      .page {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        display: flex;
        flex-direction: column;
        gap: 16px;
        opacity: 0;
        visibility: hidden;
      }
      .page.active {
        opacity: 1;
        visibility: visible;
      }
      .university-item {
        display: flex;
        align-items: center;
        padding: 20px 28px;
        background: linear-gradient(135deg, rgba(255,255,255,0.06) 0%, rgba(255,255,255,0.02) 100%);
        border-radius: 16px;
        border: 1px solid rgba(255,255,255,0.08);
      }
      .rank-top10 {
        color: #ffd700;
        text-shadow: 0 2px 15px rgba(255, 215, 0, 0.4);
      }
      .university-info { flex: 1; }
      .university-name {
        font-size: 28px;
        color: #fff;
        font-weight: 700;
        margin-bottom: 6px;
        letter-spacing: 1px;
      }
      .university-name-en {
        color: rgba(255,255,255,0.4);
        font-size: 17px;
      }
      .right-section {
        display: flex;
        flex-direction: column;
        align-items: flex-end;
        gap: 8px;
        margin-left: 20px;
      }
      .country {
        display: flex;
        align-items: center;
        gap: 6px;
        color: rgba(255,255,255,0.5);
        font-size: 16px;
      }
      .country-dot {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: var(--page-color, #e94560);
      }
      .score {
        color: var(--page-color, #e94560);
        font-weight: 700;
        font-size: 26px;
        font-family: Arial, sans-serif;
      }
      .rank {
        font-size: 44px;
        font-weight: 800;
        color: var(--page-color, #e94560);
        min-width: 75px;
        text-align: center;
        margin-right: 24px;
        font-family: Arial, sans-serif;
        text-shadow: 0 2px 10px var(--page-glow, rgba(233, 69, 96, 0.3));
      }
      .page-0 { --page-color: #e94560; --page-glow: rgba(233, 69, 96, 0.3); }
      .page-1 { --page-color: #3498db; --page-glow: rgba(52, 152, 219, 0.3); }
      .page-2 { --page-color: #2ecc71; --page-glow: rgba(46, 204, 113, 0.3); }

      .score {

        font-size: 26px;

      }
      .footer {

        text-align: center;
        color: rgba(255,255,255,0.3);

        letter-spacing: 2px;

      const FADE = 0.6;

      tl.fromTo("#page-0 .university-item", { x: 80, opacity: 0 }, { x: 0, opacity: 1, stagger: 0.12, duration: 0.5, ease: "power3.out" }, "<0.15");

        tl.to(`#page-${prev}`, { opacity: 0, duration: FADE }, `+=${PAGE_SHOW}`);

        tl.to(`#page-${p}`, { opacity: 1, duration: FADE }, `<`);
